<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLabs - Laboratorio de Física</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="login-container" class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">SmartLabs</h2>
                <p class="text-muted">Gestor de Inventario de Física</p>
            </div>
            
            <ul class="nav nav-pills nav-justified mb-3" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login" type="button" role="tab">Iniciar Sesión</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-registro" data-bs-toggle="pill" data-bs-target="#panel-registro" type="button" role="tab">Registrarse</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                <div class="tab-pane fade show active" id="panel-login" role="tabpanel">
                    <form id="form-login">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Correo Institucional</label>
                            <input type="email" class="form-control" id="login-email" placeholder="ejemplo@universidad.edu" required>
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="panel-registro" role="tabpanel">
                    <form id="form-registro">
                        <div class="mb-3">
                            <label for="reg-nombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="reg-nombre" placeholder="Encargado del Lab" required>
                        </div>
                        <div class="mb-3">
                            <label for="reg-email" class="form-label">Correo Institucional</label>
                            <input type="email" class="form-control" id="reg-email" placeholder="ejemplo@universidad.edu" required>
                        </div>
                        <div class="mb-3">
                            <label for="reg-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Crear Cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-container" class="d-none">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="#">SmartLabs 🔬</a>
                <div class="d-flex align-items-center">
                    <span id="usuario-sesion" class="text-light me-3 small"></span>
                    <button id="btn-logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
                </div>
            </div>
        </nav>

        <div class="container my-4">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0 fw-bold">Inventario de Equipos</h5>
                            <input type="text" id="buscador-inventario" class="form-control form-control-sm w-50" placeholder="Buscar herramienta...">
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table align-middle table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Código</th>
                                            <th>Herramienta</th>
                                            <th>Stock</th>
                                            <th>Estado</th>
                                            <th class="text-end">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-inventario">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 fw-bold">Registrar Préstamo</h5>
                        </div>
                        <div class="card-body">
                            <form id="form-prestamo">
                                <div class="mb-3">
                                    <label for="alumnoNombre" class="form-label">Nombre del Alumno</label>
                                    <input type="text" class="form-control" id="alumnoNombre" required>
                                </div>
                                <div class="mb-3">
                                    <label for="alumnoCodigo" class="form-label">Código Universitario</label>
                                    <input type="text" class="form-control" id="alumnoCodigo" placeholder="8 dígitos" required>
                                </div>
                                <div class="mb-3">
                                    <label for="equipoSeleccionado" class="form-label">Herramienta</label>
                                    <select class="form-select" id="equipoSeleccionado" required>
                                        </select>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Registrar Préstamo</button>
                            </form>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4 border-warning">
                        <div class="card-header bg-warning-subtle py-3 d-flex justify-content-between align-items-center" style="cursor: pointer;" data-bs-toggle="collapse" data-bs-target="#collapseInventario" aria-expanded="false" aria-controls="collapseInventario">
                            <h5 class="mb-0 fw-bold text-dark text-warning">🛠️ Administrar Equipos</h5>
                            <span class="badge bg-warning text-dark">Abrir / Cerrar</span>
                        </div>
                        <div class="collapse" id="collapseInventario">
                            <div class="card-body">
                                <form id="form-gestion-equipo">
                                    <input type="hidden" id="equipo-id-edicion"> <div class="mb-2">
                                        <label for="new-eq-codigo" class="form-label small fw-bold">Código del Equipo</label>
                                        <input type="text" class="form-control form-control-sm" id="new-eq-codigo" placeholder="Ej: OSC-01" required>
                                    </div>
                                    <div class="mb-2">
                                        <label for="new-eq-nombre" class="form-label small fw-bold">Nombre</label>
                                        <input type="text" class="form-control form-control-sm" id="new-eq-nombre" placeholder="Ej: Osciloscopio Digital" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="new-eq-stock" class="form-label small fw-bold">Stock Inicial / Disponible</label>
                                        <input type="number" class="form-control form-control-sm" id="new-eq-stock" min="0" placeholder="Ej: 5" required>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button type="submit" id="btn-submit-equipo" class="btn btn-warning btn-sm w-100 text-dark fw-bold">Agregar Equipo</button>
                                        <button type="button" id="btn-cancelar-edicion" class="btn btn-outline-secondary btn-sm d-none">Cancelar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 fw-bold">Devoluciones Activas</h5>
                        </div>
                        <div class="card-body">
                            <div id="lista-devoluciones" class="list-group list-group-flush">
                                </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h5 class="mb-0 fw-bold">Historial de Préstamos Finalizados</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Alumno</th>
                                            <th>Código</th>
                                            <th>Herramienta</th>
                                            <th>Fecha/Hora Retorno</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-historial">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="alertaToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMensaje">
                    </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
