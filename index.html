<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLabs - Laboratorio de Física</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <span class="brand-icon">⚛️</span>
          <span class="brand-text">SmartLabs</span>
        </a>
        
        <div class="d-flex align-items-center client-status">
          <span class="status-dot"></span>
          <span class="status-text text-muted small">Base Local Conectada</span>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-4">
      
      <div class="row">
        
        <div class="col-lg-8 mb-4">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 border-bottom-0">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title-custom mb-0">📊 Inventario de Equipos</h5>
                <div class="search-box">
                  <input type="text" class="form-control form-control-sm" id="buscador-inventario" placeholder="Buscar herramienta...">
                </div>
              </div>
            </div>
            
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th scope="col" class="ps-4">Código</th>
                      <th scope="col">Herramienta / Equipo</th>
                      <th scope="col">Categoría</th>
                      <th scope="col" class="text-center">Cant. Total</th>
                      <th scope="col" class="text-center">Estado</th>
                    </tr>
                  </thead>
                  <tbody id="tabla-inventario">
                    </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4 mb-4">
          
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-3 border-bottom-0">
                <h5 class="card-title-custom mb-0">📝 Registrar Préstamo</h5>
            </div>
            <div class="card-body pt-0">
              <form id="form-prestamo">
                <div class="mb-3">
                  <label for="alumnoNombre" class="form-label custom-label">Nombre del Alumno</label>
                  <input type="text" class="form-control custom-input" id="alumnoNombre" placeholder="Ej. Juan Pérez" required>
                </div>
                
                <div class="mb-3">
                  <label for="alumnoCodigo" class="form-label custom-label">Código Universitario</label>
                  <input type="text" class="form-control custom-input" id="alumnoCodigo" placeholder="Ej. 20241234" required>
                </div>
                
                <div class="mb-4">
                  <label for="equipoSeleccionado" class="form-label custom-label">Herramienta / Equipo</label>
                  <select class="form-select custom-input" id="equipoSeleccionado" required>
                    <option value="" selected disabled>Selecciona un equipo...</option>
                    <option value="FIS-001">Multímetro Digital (FIS-001)</option>
                    <option value="FIS-002">Osciloscopio de Rayos Catódicos (FIS-002)</option>
                    <option value="FIS-003">Fuente de Alimentación Regulada (FIS-003)</option>
                    <option value="FIS-004">Juego de Pesas y Soporte (FIS-004)</option>
                  </select>
                </div>
                
                <button type="submit" class="btn btn-action w-100 d-flex align-items-center justify-content-center gap-2">
                  <span>⚡</span> Registrar Préstamo
                </button>
              </form>
            </div>
          </div>

          <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 border-bottom-0">
              <h5 class="card-title-custom mb-0">⏳ Equipos en Uso</h5>
            </div>
            <div class="card-body pt-0">
              <div class="list-container" id="lista-devoluciones">
                </div>
            </div>
          </div>

        </div>
      </div>

      <div class="row mt-2 mb-5">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 border-bottom-0">
              <h5 class="card-title-custom mb-0">📜 Historial de Préstamos Finalizados</h5>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-center">
                  <thead class="table-light">
                    <tr>
                      <th scope="col">Alumno</th>
                      <th scope="col">Equipo</th>
                      <th scope="col">Hora de Préstamo</th>
                      <th scope="col">Hora de Devolución</th>
                      <th scope="col">Estado</th>
                    </tr>
                  </thead>
                  <tbody id="tabla-historial">
                    </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="liveToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">
            Mensaje de prueba.
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
